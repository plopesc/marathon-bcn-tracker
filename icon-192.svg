<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#F7931E"/>
      <stop offset="100%" stop-color="#FFD23F"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#9B0C22"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="192" height="192" rx="34"/>
    </clipPath>
  </defs>

  <rect width="192" height="192" rx="34" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="148" cy="36" r="22" fill="#FFE566" opacity="0.9"/>
  <circle cx="148" cy="36" r="15" fill="#FFD23F"/>

  <!-- Background buildings -->
  <g fill="#E8852A" opacity="0.4" clip-path="url(#clip)">
    <rect x="0"   y="116" width="16" height="36"/>
    <rect x="14"  y="108" width="12" height="44"/>
    <rect x="160" y="110" width="14" height="42"/>
    <rect x="172" y="104" width="20" height="48"/>
  </g>

  <!-- Mid buildings -->
  <g fill="#CC4A10" clip-path="url(#clip)">
    <rect x="0"  y="124" width="18" height="68"/>
    <rect x="16" y="116" width="14" height="76"/>
    <rect x="160" y="112" width="16" height="80"/>
    <rect x="174" y="120" width="18" height="72"/>
    <!-- windows -->
    <rect x="18" y="122" width="4" height="4" fill="#FFD23F" opacity="0.7"/>
    <rect x="24" y="122" width="4" height="4" fill="#FFD23F" opacity="0.5"/>
    <rect x="164" y="120" width="4" height="4" fill="#FFD23F" opacity="0.7"/>
    <rect x="178" y="128" width="4" height="4" fill="#FFD23F" opacity="0.6"/>
  </g>

  <!-- ARC DE TRIOMF -->
  <!-- Pillars -->
  <rect x="66"  y="94" width="20" height="98" fill="#B03A10" clip-path="url(#clip)"/>
  <rect x="106" y="94" width="20" height="98" fill="#B03A10" clip-path="url(#clip)"/>
  <!-- Arch -->
  <path d="M 66 120 L 66 94 Q 96 62 126 94 L 126 120 Z" fill="#B03A10"/>
  <path d="M 72 118 L 72 98 Q 96 70 120 98 L 120 118 Z" fill="url(#sky)"/>
  <!-- Frieze -->
  <rect x="58" y="86" width="76" height="14" fill="#C04415" clip-path="url(#clip)"/>
  <rect x="62" y="89" width="68" height="3" fill="#E06030" opacity="0.6"/>
  <!-- Decoration dots -->
  <circle cx="82"  cy="93" r="3" fill="#E06030" opacity="0.8"/>
  <circle cx="96"  cy="93" r="3" fill="#E06030" opacity="0.8"/>
  <circle cx="110" cy="93" r="3" fill="#E06030" opacity="0.8"/>
  <!-- Deco bands -->
  <rect x="66"  y="122" width="20" height="4" fill="#E05020"/>
  <rect x="106" y="122" width="20" height="4" fill="#E05020"/>
  <!-- Mini side pillars -->
  <rect x="52" y="100" width="10" height="92" fill="#9B3010" clip-path="url(#clip)"/>
  <rect x="130" y="100" width="10" height="92" fill="#9B3010" clip-path="url(#clip)"/>
  <rect x="49" y="94" width="16" height="10" fill="#B03A10" clip-path="url(#clip)"/>
  <rect x="127" y="94" width="16" height="10" fill="#B03A10" clip-path="url(#clip)"/>

  <!-- Ground -->
  <rect x="0" y="150" width="192" height="42" fill="url(#ground)" clip-path="url(#clip)"/>
  <!-- Path -->
  <rect x="70" y="150" width="52" height="42" fill="#A50C22" clip-path="url(#clip)"/>
  <rect x="94" y="154" width="4" height="10" fill="#CC1230" rx="1"/>
  <rect x="94" y="170" width="4" height="10" fill="#CC1230" rx="1"/>

  <!-- Trees -->
  <rect x="54" y="136" width="5" height="22" fill="#5C8A1A" clip-path="url(#clip)"/>
  <ellipse cx="56" cy="133" rx="9" ry="7" fill="#6AAD1E"/>
  <ellipse cx="50" cy="131" rx="6" ry="4" fill="#7DC426"/>
  <rect x="133" y="136" width="5" height="22" fill="#5C8A1A" clip-path="url(#clip)"/>
  <ellipse cx="135" cy="133" rx="9" ry="7" fill="#6AAD1E"/>
  <ellipse cx="141" cy="131" rx="6" ry="4" fill="#7DC426"/>

  <!-- Finish tape -->
  <rect x="70" y="148" width="52" height="4" fill="#FFD23F"/>

  <!-- Runner -->
  <g transform="translate(80, 145) scale(0.62)">
    <circle cx="30" cy="-72" r="14" fill="#FFE0C0"/>
    <rect x="22" y="-58" width="16" height="32" rx="5" fill="#FFFFFF"/>
    <rect x="24" y="-52" width="12" height="9" rx="2" fill="#C8102E"/>
    <text x="30" y="-45" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">42</text>
    <line x1="22" y1="-48" x2="7"  y2="-60" stroke="#FFE0C0" stroke-width="7" stroke-linecap="round"/>
    <line x1="38" y1="-48" x2="50" y2="-34" stroke="#FFE0C0" stroke-width="7" stroke-linecap="round"/>
    <line x1="28" y1="-26" x2="14" y2="6"   stroke="#C8102E" stroke-width="8" stroke-linecap="round"/>
    <line x1="14" y1="6"   x2="3"  y2="12"  stroke="#C8102E" stroke-width="7" stroke-linecap="round"/>
    <line x1="32" y1="-26" x2="46" y2="0"   stroke="#333366" stroke-width="8" stroke-linecap="round"/>
    <line x1="46" y1="0"   x2="55" y2="5"   stroke="#333366" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Bottom label -->
  <rect x="0" y="170" width="192" height="22" fill="#C8102E" opacity="0.92" clip-path="url(#clip)"/>
  <text x="96" y="186" font-family="Arial Black, Arial, sans-serif"
        font-size="13" font-weight="900" fill="#FFD23F"
        text-anchor="middle" letter-spacing="4">MARATÓ BCN</text>

</svg>
