<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#080810"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
  </defs>
  <!-- Running figure simplified -->
  <!-- Head -->
  <circle cx="310" cy="130" r="38" fill="#e8eaf0"/>
  <!-- Body -->
  <line x1="310" y1="168" x2="290" y2="280" stroke="#6366f1" stroke-width="22" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="300" y1="200" x2="210" y2="240" stroke="#e8eaf0" stroke-width="16" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="295" y1="210" x2="370" y2="170" stroke="#e8eaf0" stroke-width="16" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="290" y1="280" x2="220" y2="360" stroke="#e8eaf0" stroke-width="18" stroke-linecap="round"/>
  <line x1="220" y1="360" x2="170" y2="380" stroke="#e8eaf0" stroke-width="18" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="290" y1="280" x2="340" y2="370" stroke="#6366f1" stroke-width="18" stroke-linecap="round"/>
  <line x1="340" y1="370" x2="400" y2="395" stroke="#6366f1" stroke-width="18" stroke-linecap="round"/>
  <!-- BCN text -->
  <text x="256" y="470" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
        fill="#6366f1" text-anchor="middle" letter-spacing="4">BCN</text>
</svg>