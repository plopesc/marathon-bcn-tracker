<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="45%" stop-color="#F7931E"/>
      <stop offset="100%" stop-color="#FFD23F"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#9B0C22"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="90"/>
    </clipPath>
  </defs>

  <!-- Rounded rect background -->
  <rect width="512" height="512" rx="90" fill="#FF6B35"/>

  <!-- Sky gradient -->
  <rect width="512" height="512" rx="90" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="390" cy="95" r="52" fill="#FFE566" opacity="0.9"/>
  <circle cx="390" cy="95" r="38" fill="#FFD23F"/>

  <!-- ── BUILDINGS BACKGROUND (pale, far away) ──────────────────────────── -->
  <g fill="#E8852A" opacity="0.45" clip-path="url(#clip)">
    <rect x="0"   y="310" width="38" height="80"/>
    <rect x="32"  y="290" width="28" height="100"/>
    <rect x="54"  y="300" width="22" height="90"/>
    <rect x="70"  y="275" width="32" height="115"/>
    <rect x="96"  y="295" width="20" height="95"/>
    <rect x="410" y="285" width="30" height="105"/>
    <rect x="434" y="270" width="24" height="120"/>
    <rect x="452" y="288" width="36" height="102"/>
    <rect x="482" y="278" width="30" height="112"/>
  </g>

  <!-- ── SKYLINE MID LAYER ───────────────────────────────────────────────── -->
  <g fill="#CC4A10" clip-path="url(#clip)">
    <!-- Left buildings -->
    <rect x="0"   y="330" width="45" height="70"/>
    <rect x="40"  y="310" width="35" height="90"/>
    <!-- windows -->
    <rect x="46"  y="318" width="6" height="6" fill="#FFD23F" opacity="0.7"/>
    <rect x="56"  y="318" width="6" height="6" fill="#FFD23F" opacity="0.7"/>
    <rect x="46"  y="330" width="6" height="6" fill="#FFD23F" opacity="0.4"/>
    <rect x="56"  y="330" width="6" height="6" fill="#FFD23F" opacity="0.7"/>

    <!-- Right buildings -->
    <rect x="430" y="295" width="40" height="105"/>
    <rect x="464" y="308" width="48" height="92"/>
    <!-- windows -->
    <rect x="436" y="305" width="6" height="6" fill="#FFD23F" opacity="0.7"/>
    <rect x="448" y="305" width="6" height="6" fill="#FFD23F" opacity="0.4"/>
    <rect x="436" y="318" width="6" height="6" fill="#FFD23F" opacity="0.7"/>
    <rect x="448" y="318" width="6" height="6" fill="#FFD23F" opacity="0.7"/>
    <rect x="470" y="316" width="6" height="6" fill="#FFD23F" opacity="0.5"/>
    <rect x="482" y="316" width="6" height="6" fill="#FFD23F" opacity="0.7"/>
  </g>

  <!-- ── ARC DE TRIOMF (centre) ─────────────────────────────────────────── -->
  <!-- Main arch -->
  <rect x="186" y="250" width="50" height="160" fill="#B03A10" clip-path="url(#clip)"/>
  <rect x="276" y="250" width="50" height="160" fill="#B03A10" clip-path="url(#clip)"/>

  <!-- Arch opening -->
  <path d="M 186 310 L 186 250 Q 256 180 326 250 L 326 310 Z" fill="#B03A10"/>
  <path d="M 202 308 L 202 258 Q 256 200 310 258 L 310 308 Z" fill="url(#sky)"/>

  <!-- Decorative bands on pillars -->
  <rect x="186" y="320" width="50" height="8" fill="#E05020"/>
  <rect x="276" y="320" width="50" height="8" fill="#E05020"/>
  <rect x="186" y="360" width="50" height="8" fill="#E05020"/>
  <rect x="276" y="360" width="50" height="8" fill="#E05020"/>

  <!-- Frieze / top block -->
  <rect x="170" y="232" width="172" height="28" fill="#C04415" clip-path="url(#clip)"/>
  <!-- Frieze decoration -->
  <rect x="178" y="237" width="156" height="4" fill="#E06030" opacity="0.6"/>
  <circle cx="220" cy="246" r="6" fill="#E06030" opacity="0.7"/>
  <circle cx="256" cy="246" r="6" fill="#E06030" opacity="0.7"/>
  <circle cx="292" cy="246" r="6" fill="#E06030" opacity="0.7"/>

  <!-- Flanking mini-pillars -->
  <rect x="155" y="270" width="22" height="130" fill="#9B3010" clip-path="url(#clip)"/>
  <rect x="335" y="270" width="22" height="130" fill="#9B3010" clip-path="url(#clip)"/>
  <rect x="148" y="258" width="36" height="18" fill="#B03A10" clip-path="url(#clip)"/>
  <rect x="328" y="258" width="36" height="18" fill="#B03A10" clip-path="url(#clip)"/>

  <!-- ── PROMENADE / PATH ────────────────────────────────────────────────── -->
  <rect x="0" y="398" width="512" height="114" fill="url(#ground)" clip-path="url(#clip)"/>

  <!-- Path lines (Passeig Lluís Companys) -->
  <rect x="195" y="398" width="122" height="114" fill="#A50C22" clip-path="url(#clip)"/>
  <!-- Path centre line dashes -->
  <rect x="253" y="405" width="6" height="20" fill="#CC1230" rx="2"/>
  <rect x="253" y="432" width="6" height="20" fill="#CC1230" rx="2"/>
  <rect x="253" y="459" width="6" height="20" fill="#CC1230" rx="2"/>
  <rect x="253" y="486" width="6" height="20" fill="#CC1230" rx="2"/>

  <!-- Trees (palm-like flat) -->
  <!-- Left tree -->
  <rect x="158" y="365" width="8" height="50" fill="#5C8A1A"/>
  <ellipse cx="162" cy="360" rx="18" ry="14" fill="#6AAD1E"/>
  <ellipse cx="150" cy="356" rx="12" ry="8" fill="#7DC426"/>
  <ellipse cx="174" cy="354" rx="12" ry="8" fill="#7DC426"/>
  <!-- Right tree -->
  <rect x="346" y="365" width="8" height="50" fill="#5C8A1A"/>
  <ellipse cx="350" cy="360" rx="18" ry="14" fill="#6AAD1E"/>
  <ellipse cx="338" cy="356" rx="12" ry="8" fill="#7DC426"/>
  <ellipse cx="362" cy="354" rx="12" ry="8" fill="#7DC426"/>

  <!-- ── FINISH TAPE ─────────────────────────────────────────────────────── -->
  <rect x="195" y="395" width="122" height="7" fill="#FFD23F"/>
  <rect x="195" y="395" width="122" height="7" fill="url(#stripePat)" opacity="0.5"/>

  <!-- ── RUNNER silhouette ──────────────────────────────────────────────── -->
  <g transform="translate(232, 390) scale(0.82)" fill="none">
    <!-- Head -->
    <circle cx="30" cy="-72" r="14" fill="#FFE0C0"/>
    <!-- Body -->
    <rect x="22" y="-58" width="16" height="36" rx="6" fill="#FFFFFF"/>
    <!-- Number bib -->
    <rect x="24" y="-52" width="12" height="10" rx="2" fill="#C8102E"/>
    <text x="30" y="-44" font-family="Arial" font-size="7" font-weight="bold"
          fill="white" text-anchor="middle">42</text>
    <!-- Left arm (raised) -->
    <line x1="22" y1="-50" x2="6"  y2="-62" stroke="#FFE0C0" stroke-width="7" stroke-linecap="round"/>
    <!-- Right arm (down-back) -->
    <line x1="38" y1="-50" x2="50" y2="-36" stroke="#FFE0C0" stroke-width="7" stroke-linecap="round"/>
    <!-- Left leg (forward) -->
    <line x1="28" y1="-22" x2="16" y2="8"   stroke="#C8102E" stroke-width="8" stroke-linecap="round"/>
    <line x1="16" y1="8"   x2="4"  y2="14"  stroke="#C8102E" stroke-width="7" stroke-linecap="round"/>
    <!-- Right leg (back, pushing) -->
    <line x1="32" y1="-22" x2="46" y2="2"   stroke="#333366" stroke-width="8" stroke-linecap="round"/>
    <line x1="46" y1="2"   x2="56" y2="6"   stroke="#333366" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- ── BOTTOM LABEL STRIP ─────────────────────────────────────────────── -->
  <rect x="0" y="460" width="512" height="52" rx="0" fill="#C8102E" opacity="0.92" clip-path="url(#clip)"/>
  <text x="256" y="492" font-family="Arial Black, Arial, sans-serif"
        font-size="30" font-weight="900" fill="#FFD23F"
        text-anchor="middle" letter-spacing="8">MARATÓ BCN</text>
  <text x="256" y="507" font-family="Arial, sans-serif"
        font-size="11" fill="#FFB0A0"
        text-anchor="middle" letter-spacing="4">ARC DE TRIOMF · 42.195 KM</text>

</svg>
